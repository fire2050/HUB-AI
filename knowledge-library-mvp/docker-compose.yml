name: finance-wukong-mvp

services:
  finance-wukong:
    build: .
    container_name: finance-wukong-mvp
    ports:
      - "8000:8000"
    environment:
      FINANCE_WUKONG_DB: /data/finance_wukong.db
    volumes:
      - finance_wukong_data:/data
      - hubai_uploads:/app/data/uploads
      - ../wukong_series_archive:/app/wukong_series_archive:ro
    command: ["sh", "-c", "python scripts/init_db.py && python scripts/init_hubai_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    restart: unless-stopped

volumes:
  finance_wukong_data:
  hubai_uploads:
